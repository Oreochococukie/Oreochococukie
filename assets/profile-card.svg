<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Oreochococukie GitHub profile card</title>
  <desc id="desc">A pixel-art cookie developer next to a terminal-style summary of Oreochococukie's technology stack and GitHub activity.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#090c12"/>
    </linearGradient>
    <linearGradient id="portraitFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.55" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="1"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#c84b31" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <clipPath id="cardClip">
      <rect x="1" y="1" width="1398" height="618" rx="24"/>
    </clipPath>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="1398" height="618" rx="24" fill="url(#background)" stroke="#30363d" stroke-width="2"/>
  <g clip-path="url(#cardClip)">
    <rect x="0" y="0" width="1400" height="620" fill="url(#grid)"/>
    <circle cx="462" cy="150" r="150" fill="#58e6ff" opacity="0.08" filter="url(#softGlow)"/>
    <circle cx="220" cy="470" r="180" fill="#c84b31" opacity="0.10" filter="url(#softGlow)"/>

    <image x="12" y="12" width="620" height="620" xlink:href="snow-leopard-pixel.png" preserveAspectRatio="xMidYMid meet" style="image-rendering: pixelated"/>
    <rect x="0" y="0" width="660" height="620" fill="url(#portraitFade)"/>

    <rect x="620" y="48" width="730" height="524" rx="18" fill="#0d1117" fill-opacity="0.86" stroke="#30363d" stroke-width="2"/>

    <g font-family="Menlo, Monaco, Consolas, 'Liberation Mono', monospace">
      <text x="672" y="102" font-size="26" font-weight="700" fill="#58a6ff">Oreochococukie@github</text>
      <line x1="1005" y1="94" x2="1298" y2="94" stroke="#484f58" stroke-width="2"/>

      <text x="672" y="152" font-size="19" fill="#8b949e">●</text>
      <text x="704" y="152" font-size="19" font-weight="700" fill="#e3b341">PROFILE</text>
      <text x="672" y="191" font-size="18" fill="#8b949e">Since</text>
      <text x="820" y="191" font-size="18" fill="#c9d1d9">April 2022 · 4 years building</text>
      <text x="672" y="226" font-size="18" fill="#8b949e">Focus</text>
      <text x="820" y="226" font-size="18" fill="#c9d1d9">Full-stack · Automation · Dev Tools</text>

      <text x="672" y="282" font-size="19" fill="#8b949e">●</text>
      <text x="704" y="282" font-size="19" font-weight="700" fill="#e3b341">STACK</text>
      <text x="672" y="321" font-size="18" fill="#8b949e">Core</text>
      <text x="820" y="321" font-size="18" fill="#c9d1d9">JavaScript · Python · TypeScript</text>
      <text x="672" y="356" font-size="18" fill="#8b949e">Also</text>
      <text x="820" y="356" font-size="18" fill="#c9d1d9">CSS · Shell · SQL</text>

      <text x="672" y="412" font-size="19" fill="#8b949e">●</text>
      <text x="704" y="412" font-size="19" font-weight="700" fill="#e3b341">GITHUB</text>
      <text x="672" y="451" font-size="18" fill="#8b949e">Activity</text>
      <text x="820" y="451" font-size="18" fill="#3fb950">1,482 contributions / last 12 months</text>
      <text x="672" y="486" font-size="18" fill="#8b949e">Profile</text>
      <text x="820" y="486" font-size="18" fill="#58a6ff">github.com/Oreochococukie</text>

      <text x="672" y="540" font-size="15" fill="#6e7681">private repository names intentionally omitted</text>
    </g>
  </g>
</svg>
